info:
  name: Artist erstellen
  type: graphql
  seq: 1

graphql:
  method: POST
  url: "{{graphqlUrl}}"
  body:
    query: |-
      mutation CreateArtist($artistInput: ArtistInput!) {
        create(artistInput: $artistInput) {
          id
        }
      }
    variables: |-
      {
        "artistInput": {
          "name": "Graphql Artist",
          "email": "graphql.artist@example.com",
          "geburtsdatum": "2026-01-01",
          "vertrag": {
            "startdatum": "2026-01-01",
            "enddatum": "2027-12-31",
            "dauer": 16,
            "firma": "Universal",
            "gehalt": 1120000.0
          },
          "songs": [3010],
          "username": "graphqlartist"
        }
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
