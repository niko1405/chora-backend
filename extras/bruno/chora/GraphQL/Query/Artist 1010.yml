info:
  name: Artist 1010
  type: graphql
  seq: 1

graphql:
  method: POST
  url: "{{graphqlUrl}}"
  body:
    query: |-
      query ArtistById($artistId: ID!) {
        artist(artistId: $artistId) {
          id
          name
          email
        }
      }
    variables: |-
      {
        "artistId": "1010"
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
