info:
  name: Token mit falschem Passwort
  type: http
  seq: 2

http:
  method: POST
  url: "{{tokenUrl}}"
  body:
    type: json
    data: |-
      {
        "username": "admin",
        "password": "falsch"
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "401"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
