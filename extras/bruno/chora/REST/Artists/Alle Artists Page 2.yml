info:
  name: Alle Artists Page 2
  type: http
  seq: 2

http:
  method: GET
  url: "{{restArtistsUrl}}?page=1"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: page
      value: "1"
      type: query

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.content
      operator: isArray

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
