info:
  name: Artist anlegen
  type: http
  seq: 5

http:
  method: POST
  url: "{{restArtistsUrl}}"
  body:
    type: json
    data: |-
      {
        "name": "Test",
        "geburtsdatum": "1990-01-01",
        "email": "bruno.artist@example.com",
        "username": "test",
        "vertrag": {
          "startdatum": "2026-01-01",
          "enddatum": "2027-12-31",
          "dauer": 24,
          "firma": "Universal",
          "gehalt": 120000.0
        },
        "songs": [3040]
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "201"
    - expression: res.headers.location
      operator: matches
      value: \/rest\/artists\/[1-9]\d*$

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
