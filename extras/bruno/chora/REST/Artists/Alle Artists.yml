info:
  name: Alle Artists
  type: http
  seq: 1

http:
  method: GET
  url: "{{restArtistsUrl}}"
  headers:
    - name: Accept
      value: application/json

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.content
      operator: isArray

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
