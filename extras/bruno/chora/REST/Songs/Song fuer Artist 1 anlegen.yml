info:
  name: Song fuer Artist 1 anlegen
  type: http
  seq: 3

http:
  method: POST
  url: "{{restArtistsUrl}}/:artistId/songs"
  params:
    - name: artistId
      value: "999999"
      type: path
  body:
    type: json
    data: |-
      {
        "titel": "Bruno Song Neu",
        "genres": ["Jazz"],
        "erscheinungsdatum": "2026-05-01",
        "dauer": 190
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "404"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
