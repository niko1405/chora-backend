info:
  name: Alle Songs
  type: http
  seq: 1

http:
  method: GET
  url: "{{restSongsUrl}}?page=0"
  params:
    - name: page
      value: "0"
      type: query

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.content
      operator: isArray

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
