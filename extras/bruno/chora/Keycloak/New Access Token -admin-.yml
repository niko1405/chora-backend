info:
  name: New Access Token -admin-
  type: http
  seq: 2

http:
  method: POST
  url: "{{oidcTokenUrl}}"
  headers:
    - name: Content-Type
      value: application/x-www-form-urlencoded
  body:
    type: form-urlencoded
    data:
      - name: grant_type
        value: password
      - name: client_id
        value: "{{clientId}}"
      - name: client_secret
        value: "{{clientSecret}}"
      - name: username
        value: "{{username}}"
      - name: password
        value: "{{password}}"
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.access_token
      operator: matches
      value: .\..+\..+

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
