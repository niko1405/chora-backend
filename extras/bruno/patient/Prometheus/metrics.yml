info:
  name: metrics
  type: http
  seq: 1

http:
  method: GET
  url: https://localhost:8000/metrics
  headers:
    - name: Accept
      value: text/plain
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: matches
      value: ^application\/json(; charset=utf-8)?$
      disabled: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
