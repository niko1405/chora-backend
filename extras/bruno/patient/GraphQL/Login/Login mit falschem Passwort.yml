info:
  name: Login mit falschem Passwort
  type: graphql
  seq: 2

graphql:
  method: POST
  url: "{{graphqlUrl}}"
  headers:
    - name: ""
      value: ""
      disabled: true
  params:
    - name: ""
      value: ""
      type: query
      disabled: true
  body:
    query: |-
      mutation {
        login(username: "admin", password: "FALSCH") {
          token
          expiresIn
          roles
        }
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.errors
      operator: isArray
    - expression: res.body.errors
      operator: length
      value: "1"
    - expression: res.body.errors[0].message
      operator: contains
      value: Benutzerdaten
    - expression: res.body.errors[0].path
      operator: isArray
    - expression: res.body.errors[0].path
      operator: length
      value: "1"
    - expression: res.body.errors[0].path[0]
      operator: eq
      value: login
    - expression: res.body.data
      operator: isNull

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
