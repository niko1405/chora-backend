info:
  name: Neuer Patient
  type: graphql
  seq: 1

graphql:
  method: POST
  url: "{{graphqlUrl}}"
  headers:
    - name: ""
      value: ""
      disabled: true
  body:
    query: |-
      mutation {
        create(
          patientInput: {
            nachname: "Nachnamegraphql"
            email: "testgraphql@test.graphql"
            kategorie: 9
            hasNewsletter: true
            geburtsdatum: "2022-02-02"
            homepage: "https://test.graphql"
            geschlecht: WEIBLICH
            familienstand: LEDIG
            fachaerzte: [CHIRURGIE]
            adresse: {
              plz: "99999"
              ort: "Testort"
            }
            rechnungen: [{
              betrag: "999.99"
              waehrung: "EUR"
            }]
            username: "testgraphql"
          }
        ) {
          id
        }
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.data
      operator: isJson
    - expression: res.body.data.create.id
      operator: gte
      value: "0"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
