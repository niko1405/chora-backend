info:
  name: Token ohne Passwort
  type: http
  seq: 3

http:
  method: POST
  url: "{{tokenUrl}}"
  headers:
    - name: ""
      value: ""
      disabled: true
  params:
    - name: ""
      value: ""
      type: query
      disabled: true
  body:
    type: json
    data: |-
      {
          "username": "admin"
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "401"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
