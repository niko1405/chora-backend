info:
  name: Vorhandene ID 30
  type: http
  seq: 6

http:
  method: GET
  url: "{{restUrl}}/:id"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: id
      value: "30"
      type: path
  auth:
    type: bearer
    token: "{{TOKEN}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.id
      operator: eq
      value: "30"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
