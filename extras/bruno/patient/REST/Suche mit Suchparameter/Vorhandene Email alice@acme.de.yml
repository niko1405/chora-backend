info:
  name: Vorhandene Email alice@acme.de
  type: http
  seq: 5

http:
  method: GET
  url: "{{restUrl}}?email=alice@acme.de"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: email
      value: alice@acme.de
      type: query
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Body: Email alice@acme.de und ID > 0', () => {
          const { email, id } = res.getBody().content[0];
          expect(email).to.be.equal('alice@acme.de');
          expect(id).to.be.above(0);
        });
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.content
      operator: isArray
    - expression: res.body.content
      operator: length
      value: "1"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
