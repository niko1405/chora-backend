info:
  name: Vorhandener Nachname Alice
  type: http
  seq: 3

http:
  method: GET
  url: "{{restUrl}}?nachname=Alice"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: nachname
      value: Alice
      type: query
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Body: Nachname "Alpha" und ID > 0', () => {
          res.getBody()
            .content
            .forEach(patient => {
              const { nachname, id } = patient;
              expect(nachname).to.be.equal('Alice');
              expect(id).to.be.above(0);
            });
        });
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.content
      operator: isArray
    - expression: res.body.content
      operator: isNotEmpty

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
