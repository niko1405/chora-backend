info:
  name: Vorhandene ID 30 mit ungültigem Token
  type: http
  seq: 3

http:
  method: GET
  url: "{{restUrl}}/:id"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: id
      value: "30"
      type: path
  auth:
    type: bearer
    token: "{{TOKEN}}UNGUELTIG"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "401"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
