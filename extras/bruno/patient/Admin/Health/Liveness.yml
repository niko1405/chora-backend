info:
  name: Liveness
  type: http
  seq: 1

http:
  method: GET
  url: "{{healthUrl}}/liveness"
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.status
      operator: eq
      value: up

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
